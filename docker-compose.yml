services:
  data_ingestion:
    build: ./data_ingestion
    container_name: cryptoscalper_data_ingestion
    env_file:
      - path: .env
        required: false
    secrets:
      - binance_api_key
      - binance_api_secret
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    restart: unless-stopped

  live_executor:
    build: ./live_executor
    container_name: cryptoscalper_live_executor
    env_file:
      - path: .env
        required: false
    secrets:
      - binance_api_key
      - binance_api_secret
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    restart: unless-stopped

  signal_engine:
    build: ./signal_engine
    container_name: cryptoscalper_signal_engine
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    restart: unless-stopped

  risk_manager:
    build: ./risk_manager
    container_name: cryptoscalper_risk_manager
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    restart: unless-stopped

  order_executor:
    build: ./order_executor
    container_name: cryptoscalper_order_executor
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    restart: unless-stopped

  api_gateway:
    build: ./api_gateway
    container_name: cryptoscalper_api_gateway
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: cryptoscalper_dashboard
    ports:
      - "3000:80"
    depends_on:
      api_gateway:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cryptoscalper_redis
    ports:
      - "6379:6379"
    networks:
      - cryptoscalper_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: cryptoscalper_timescaledb
    environment:
      POSTGRES_USER: ${DB_USER:-crypto_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crypto_pass}
      POSTGRES_DB: ${DB_NAME:-cryptoscalper_db}
    ports:
      - "5432:5432"
    networks:
      - cryptoscalper_net
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crypto_user} -d ${DB_NAME:-cryptoscalper_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: cryptoscalper_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - cryptoscalper_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: cryptoscalper_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - cryptoscalper_net
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  cryptoscalper_net:
    driver: bridge

volumes:
  timescaledb_data:

secrets:
  binance_api_key:
    file: ./secrets/binance_api_key.txt
  binance_api_secret:
    file: ./secrets/binance_api_secret.txt
