version: '3.8'

services:
  data_ingestion:
    build: ./data_ingestion
    container_name: cryptoscalper_data_ingestion
    env_file:
      - path: .env
        required: false
    environment:
      TICK_PERSIST_ENABLED: "true"
      TICK_FLUSH_INTERVAL_SEC: "1.0"
      TICK_FLUSH_MAX_BATCH: "500"
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-crypto_user}
      DB_PASSWORD: ${DB_PASSWORD:-crypto_pass}
      DB_NAME: ${DB_NAME:-cryptoscalper_db}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      api_gateway:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    restart: unless-stopped

  signal_engine:
    build: ./signal_engine
    container_name: cryptoscalper_signal_engine
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    volumes:
      - ./shared_config:/app/shared_config
    restart: unless-stopped

  risk_manager:
    build: ./risk_manager
    container_name: cryptoscalper_risk_manager
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    volumes:
      - ./shared_config:/app/shared_config:ro
    restart: unless-stopped

  order_executor:
    build: ./order_executor
    container_name: cryptoscalper_order_executor
    env_file:
      - path: .env
        required: false
    environment:
      PAPER_TRADING: "true"
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      api_gateway:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    restart: unless-stopped

  reporter:
    build:
      context: .
      dockerfile: reporter/Dockerfile
    container_name: cryptoscalper_reporter
    env_file:
      - path: .env
        required: false
    environment:
      PHASE1_REPORT_TZ: Europe/Rome
      PHASE1_REPORT_HOUR: "8"
      PHASE1_REPORT_MINUTE: "0"
      PHASE1_STRATEGY_CHECK_SEC: "600"
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      api_gateway:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    volumes:
      - ./reports:/app/reports
      - ./scripts:/app/scripts:ro
      - ./shared_config:/app/shared_config:ro
    restart: unless-stopped

  # LLM advisor (read-only, Phase 1 safe): docker compose --profile llm up -d llm_optimizer
  llm_optimizer:
    profiles: ["llm"]
    build: ./llm_optimizer
    container_name: cryptoscalper_llm_optimizer
    env_file:
      - path: .env
        required: false
    environment:
      LLM_MODE: advisor
      LLM_PHASE1_SAFE: "true"
      LLM_INTERVAL_SEC: "86400"
      LLM_REPORTS_DIR: /app/reports
      SHARED_CONFIG_PATH: /app/shared_config/config.yaml
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      api_gateway:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    volumes:
      - ./shared_config:/app/shared_config:ro
      - ./reports:/app/reports
    restart: unless-stopped

  api_gateway:
    build: ./api_gateway
    container_name: cryptoscalper_api_gateway
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    healthcheck:
      test: ["CMD", "python", "verify_db_schema.py"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
        VITE_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    container_name: cryptoscalper_dashboard
    ports:
      - "3000:80"
    depends_on:
      - api_gateway
    networks:
      - cryptoscalper_net
    restart: unless-stopped

  telegram_alerter:
    build: ./telegram_alerter
    container_name: cryptoscalper_telegram_alerter
    env_file:
      - path: .env
        required: false
    environment:
      PHASE1_QUIET: "true"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cryptoscalper_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cryptoscalper_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cryptoscalper_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: cryptoscalper_timescaledb
    environment:
      POSTGRES_USER: ${DB_USER:-crypto_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crypto_pass}
      POSTGRES_DB: ${DB_NAME:-cryptoscalper_db}
    ports:
      - "5432:5432"
    networks:
      - cryptoscalper_net
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crypto_user} -d ${DB_NAME:-cryptoscalper_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  cryptoscalper_net:
    driver: bridge

volumes:
  timescaledb_data:
  redis_data:
